<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="5" fill="#2c2c2c"/>

  <!-- Crimson border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="4.5" fill="none" stroke="#dc143c" stroke-width="1.5"/>

  <!-- Film perforation notches — top-left and bottom-right -->
  <rect x="2.5" y="2.5" width="5" height="3" rx="0.75" fill="#3e3e3e" stroke="#dc143c" stroke-width="0.75"/>
  <rect x="24.5" y="26.5" width="5" height="3" rx="0.75" fill="#3e3e3e" stroke="#dc143c" stroke-width="0.75"/>

  <!-- Simple bold serif "C" — clear at small sizes -->
  <text x="16" y="22"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-weight="bold"
        fill="white">C</text>
</svg>
